name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: expresswash-prod-202605112332
  REGION: southamerica-west1
  SERVICE: express-wash
  IMAGE: southamerica-west1-docker.pkg.dev/expresswash-prod-202605112332/express-wash/express-wash

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://southamerica-west1-docker.pkg.dev
      - name: Build and Push image
        env:
          NEXT_PUBLIC_FIREBASE_CONFIG: ${{ secrets.NEXT_PUBLIC_FIREBASE_CONFIG }}
          NEXT_PUBLIC_BASE_LAT: ${{ secrets.NEXT_PUBLIC_BASE_LAT }}
          NEXT_PUBLIC_BASE_LON: ${{ secrets.NEXT_PUBLIC_BASE_LON }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
        run: docker buildx build --build-arg NEXT_PUBLIC_FIREBASE_CONFIG --build-arg NEXT_PUBLIC_BASE_LAT --build-arg NEXT_PUBLIC_BASE_LON --build-arg NEXT_PUBLIC_EMAILJS_SERVICE_ID --build-arg NEXT_PUBLIC_EMAILJS_TEMPLATE_ID --build-arg NEXT_PUBLIC_EMAILJS_PUBLIC_KEY -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest --push .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},OWNER_EMAIL=${{ secrets.OWNER_EMAIL }}"
