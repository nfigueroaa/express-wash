name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: expresswash-prod-202605112332
  REGION: southamerica-west1
  SERVICE: express-wash
  IMAGE: southamerica-west1-docker.pkg.dev/expresswash-prod-202605112332/express-wash/express-wash

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build and Push with Cloud Build
        run: gcloud builds submit --config=cloudbuild.yaml --substitutions="_IMAGE_NAME=${{ env.IMAGE }},_COMMIT_SHA=${{ github.sha }},_NEXT_PUBLIC_FIREBASE_CONFIG=${{ secrets.NEXT_PUBLIC_FIREBASE_CONFIG }},_NEXT_PUBLIC_BASE_LAT=${{ secrets.NEXT_PUBLIC_BASE_LAT }},_NEXT_PUBLIC_BASE_LON=${{ secrets.NEXT_PUBLIC_BASE_LON }},_NEXT_PUBLIC_EMAILJS_SERVICE_ID=${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }},_NEXT_PUBLIC_EMAILJS_TEMPLATE_ID=${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }},_NEXT_PUBLIC_EMAILJS_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},OWNER_EMAIL=${{ secrets.OWNER_EMAIL }}"
