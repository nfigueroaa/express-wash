steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_CONFIG=${_NEXT_PUBLIC_FIREBASE_CONFIG}'
      - '--build-arg'
      - 'NEXT_PUBLIC_BASE_LAT=${_NEXT_PUBLIC_BASE_LAT}'
      - '--build-arg'
      - 'NEXT_PUBLIC_BASE_LON=${_NEXT_PUBLIC_BASE_LON}'
      - '--build-arg'
      - 'NEXT_PUBLIC_EMAILJS_SERVICE_ID=${_NEXT_PUBLIC_EMAILJS_SERVICE_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_EMAILJS_TEMPLATE_ID=${_NEXT_PUBLIC_EMAILJS_TEMPLATE_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_EMAILJS_PUBLIC_KEY=${_NEXT_PUBLIC_EMAILJS_PUBLIC_KEY}'
      - '-t'
      - '${_IMAGE_NAME}:${_COMMIT_SHA}'
      - '-t'
      - '${_IMAGE_NAME}:latest'
      - '.'

images:
  - '${_IMAGE_NAME}:${_COMMIT_SHA}'
  - '${_IMAGE_NAME}:latest'

options:
  machineType: 'N1_HIGHCPU_8'
